<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" />
  
  <!-- Motorcycle Body -->
  <g transform="translate(15, 20)">
    <!-- Rear Wheel -->
    <circle cx="20" cy="50" r="14" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="20" cy="50" r="4" fill="white"/>
    
    <!-- Front Wheel -->
    <circle cx="60" cy="50" r="14" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="60" cy="50" r="4" fill="white"/>
    
    <!-- Frame -->
    <path d="M15 35 L30 20 L55 20 L65 35" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Engine -->
    <rect x="30" y="25" width="20" height="12" rx="3" fill="white"/>
    
    <!-- Seat -->
    <path d="M20 22 L35 18 L50 20" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Handlebars -->
    <line x1="60" y1="15" x2="55" y2="25" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="15" x2="65" y2="15" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Exhaust -->
    <path d="M15 40 L5 45 L5 50" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>