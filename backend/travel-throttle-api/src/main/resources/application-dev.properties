# ============================================
# DEVELOPMENT CONFIGURATION
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_throttle_dev
spring.datasource.username=postgres
spring.datasource.password=root

# Create-drop for development (recreates tables each run)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Enable SQL init for dev
spring.sql.init.mode=never

# Detailed logging for development
logging.level.com.travelthrottle=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# CORS for dev
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Show stack traces in dev
server.error.include-stacktrace=always