# ============================================
# PRODUCTION CONFIGURATION
# ============================================
# Use environment variables for sensitive data
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Validate schema in production (don't auto-update)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Disable SQL init in production
spring.sql.init.mode=never

# Production logging
logging.level.root=WARN
logging.level.com.travelthrottle=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# CORS for production (set via environment variable)
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# Hide error details in production
server.error.include-stacktrace=never
server.error.include-message=false

# JWT Secret from environment
app.jwt.secret=${JWT_SECRET}

# File upload
app.upload.dir=/var/www/uploads