# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=travel-throttle-api
server.port=8080
server.servlet.context-path=/api
server.servlet.session.persistent=true
server.servlet.session.timeout=30d

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_throttle
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ============================================
# SQL INIT
# ============================================
spring.sql.init.mode=never

# ============================================
# JWT - 30 DAYS EXPIRATION
# ============================================
app.jwt.secret=TravelThrottleSuperSecretKeyForJWTTokenGeneration2024WithVeryLongStringForSecurityAndMoreLengthAndExtraCharactersToMakeItSecureEnoughForProductionUseWithEvenMoreRandomDataAddedHereForMaximumSecurity
app.jwt.expiration=2592000000
app.jwt.refresh-expiration=7776000000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000

# ============================================
# LOGGING
# ============================================
logging.level.root=WARN
logging.level.com.travelthrottle=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# SPRING MAIN
# ============================================
spring.main.allow-circular-references=true

# ============================================
# OAUTH2 - DISABLED (Add credentials to enable)
# ============================================
# spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=email,profile
# spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/oauth2/callback/google

# ============================================
# WEBSOCKET CONFIGURATION
# ============================================
spring.websocket.path=/ws
spring.websocket.allowed-origins=http://localhost:5173,http://localhost:3000